networks:
  minilab:
    external: true

services:
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    environment:
      CONTAINERS: 1
      POST: 1
      EXEC: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      minilab:
        ipv4_address: 172.20.0.31
    labels:
      - "minilab.service=docker-socket-proxy"

  mariadb:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: mariadb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
    volumes:
      - /mnt/ssd/mariadb/config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3306"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      minilab:
        ipv4_address: 172.20.0.40
    labels:
      - "minilab.service=mariadb"