networks:
  minilab:
    external: true

services:
  valheim:
    image: tsxcloud/valheim-arm:arm64
    container_name: valheim
    cap_add:
      - sys_nice
    environment:
      - SERVER_NAME=${VALHEIM_SERVER_NAME}
      - WORLD_NAME=${VALHEIM_WORLD_NAME}
      - SERVER_PASSWORD=${VALHEIM_PASSWORD}
      - SERVER_PUBLIC=0
      - UPDATE=enabled
      - SAVE_INTERVAL=1800
      - TZ=Europe/Paris
    volumes:
      - /mnt/ssd/valheim:/root/.config/unity3d/IronGate/Valheim
      - /mnt/ssd/valheim/backups:/data/backups
    ports:
      - "2456:2456/udp"
      - "2457:2457/udp"
      - "2458:2458/udp"
    restart: unless-stopped
    networks:
      minilab:
        ipv4_address: 172.20.0.20
    labels:
      - "minilab.service=valheim"

  ragnarok:
    build:
      context: ./ragnarok
      dockerfile: Dockerfile
    container_name: ragnarok
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${RO_DB_USER}
      - DB_PASSWORD=${RO_DB_PASSWORD}
      - DB_NAME=${RO_DB_NAME}
      - SERVER_NAME=${RO_SERVER_NAME}
      - TZ=Europe/Paris
    ports:
      - "6900:6900/tcp"
      - "6121:6121/tcp"
      - "5121:5121/tcp"
    restart: unless-stopped
    networks:
      minilab:
        ipv4_address: 172.20.0.21
    depends_on:
      - mariadb
    labels:
      - "minilab.service=ragnarok"