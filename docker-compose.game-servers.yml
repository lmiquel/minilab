networks:
  minilab:
    external: true

services:
  valheim:
    image: tsxcloud/valheim-arm:arm64
    container_name: valheim
    cap_add:
      - sys_nice
    environment:
      - SERVER_NAME=${VALHEIM_SERVER_NAME}
      - WORLD_NAME=${VALHEIM_WORLD_NAME}
      - SERVER_PASSWORD=${VALHEIM_PASSWORD}
      - SERVER_PUBLIC=0
      - UPDATE=enabled
      - SAVE_INTERVAL=1800
      - TZ=Europe/Paris
    volumes:
      - /mnt/ssd/valheim:/root/.config/unity3d/IronGate/Valheim
      - /mnt/ssd/valheim/backups:/data/backups
    ports:
      - "2456:2456/udp"
      - "2457:2457/udp"
      - "2458:2458/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/2456"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 240s
    networks:
      minilab:
        ipv4_address: 172.20.0.20
    labels:
      - "minilab.service=valheim"

  cobblemon:
    image: itzg/minecraft-server:java21
    container_name: cobblemon
    tty: true
    stdin_open: true
    environment:
      - UID=1000
      - GID=1000
      - EULA=TRUE
      - TZ=Europe/Paris
      - TYPE=FABRIC
      - MOD_PLATFORM=MODRINTH
      - MODRINTH_MODPACK=cobblemon-fabric
      - MODRINTH_LOADER=fabric
      - INIT_MEMORY=2G
      - MAX_MEMORY=5G
      - DIFFICULTY=normal
      - MOTD=${COBBLEMON_MOTD}
      - MAX_PLAYERS=3
      - PVP=FALSE
      - SERVER_NAME=${COBBLEMON_SERVER_NAME}
      - SPAWN_MONSTERS=false
    volumes:
      - /mnt/ssd/cobblemon:/data
    ports:
      - "25565:25565/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/25565"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 240s
    networks:
      minilab:
        ipv4_address: 172.20.0.22
    labels:
      - "minilab.service=cobblemon"

  core-keeper:
    image: escaping/core-keeper-dedicated:latest
    container_name: core-keeper
    restart: unless-stopped
    stop_grace_period: 2m
    environment:
      - ARM64_DEVICE=rpi4-pre3
      - USE_DEPOT_DOWNLOADER=true
      - WORLD_NAME=${CORE_KEEPER_WORLD_NAME}
      - SERVER_NAME=${CORE_KEEPER_SERVER_NAME}
      - PASSWORD=${CORE_KEEPER_PASSWORD}
      - MAX_PLAYERS=5
      - SERVER_IP=mini.lab
      - SERVER_PORT=17000
      - TZ=Europe/Paris
    volumes:
      - /mnt/ssd/core-keeper/server-files:/home/steam/core-keeper-dedicated
      - /mnt/ssd/core-keeper/server-data:/home/steam/core-keeper-data
    ports:
      - "17000:17000/udp"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/17000"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 240s
    networks:
      minilab:
        ipv4_address: 172.20.0.23
    labels:
      - "minilab.service=core-keeper"