networks:
  minilab:
    external: true

services:
  pingvin-share:
    image: smp46/pingvin-share-x:latest
    container_name: pingvin-share
    environment:
      - TZ=Europe/Paris
      - BACKEND_URL=https://${PINGVIN_HOSTNAME}
    volumes:
      - /mnt/ssd/pingvin/data:/opt/app/backend/data
      - /mnt/ssd/pingvin/images:/opt/app/frontend/public/img
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      minilab:
        ipv4_address: 172.20.0.41
    labels:
      - "minilab.service=pingvin-share"

  minilab-helper:
    build:
      context: ./minilab-helper
      dockerfile: Dockerfile
    container_name: minilab-helper
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_OWNER_ID=${DISCORD_OWNER_ID}
      - WG_PEERS=${WG_PEERS}
      - TZ=Europe/Paris
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - /sys/class/thermal/thermal_zone0/temp:/sys/class/thermal/thermal_zone0/temp:ro
      - /proc/stat:/proc/host/stat:ro
      - /proc/meminfo:/proc/host/meminfo:ro
    restart: unless-stopped
    healthcheck:
      # Vérifie que le process Node tourne correctement
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      minilab:
        ipv4_address: 172.20.0.30
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    labels:
      - "minilab.service=minilab-helper"