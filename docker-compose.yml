networks:
  minilab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
      - UPDATE_IP=ipv4
      - LOG_FILE=false
    volumes:
      - /mnt/ssd/duckdns/config:/config
    restart: unless-stopped

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    environment:
      - TZ=Europe/Paris
      - WEBPASSWORD=${PIHOLE_PASSWORD}
      - PIHOLE_DNS_=1.1.1.1;1.0.0.1
      - DNSSEC=true
      - DNSMASQ_LISTENING=all
      - VIRTUAL_HOST=pihole.minilab
    volumes:
      - /mnt/ssd/pihole/etc:/etc/pihole
      - /mnt/ssd/pihole/dnsmasq:/etc/dnsmasq.d
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    networks:
      minilab:
        ipv4_address: 172.20.0.3

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - SERVERURL=${WG_SERVER_URL}
      - SERVERPORT=51820
      - PEERS=${WG_PEERS}
      - PEERDNS=172.20.0.3
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
      - PERSISTENTKEEPALIVE_PEERS=all
      - LOG_CONFS=true
    volumes:
      - /mnt/ssd/wireguard/config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    networks:
      minilab:
        ipv4_address: 172.20.0.10
    depends_on:
      - pihole
      - duckdns

  valheim:
    image: tsxcloud/valheim-arm:arm64
    container_name: valheim
    cap_add:
      - sys_nice
    environment:
      - SERVER_NAME=${VALHEIM_SERVER_NAME}
      - WORLD_NAME=${VALHEIM_WORLD_NAME}
      - SERVER_PASSWORD=${VALHEIM_PASSWORD}
      - SERVER_PUBLIC=0
      - UPDATE=enabled
      - SAVE_INTERVAL=1800
      - TZ=Europe/Paris
    volumes:
      - /mnt/ssd/valheim:/root/.config/unity3d/IronGate/Valheim
      - /mnt/ssd/valheim/backups:/data/backups
    ports:
      - "2456:2456/udp"
      - "2457:2457/udp"
      - "2458:2458/udp"
    restart: unless-stopped
    networks:
      minilab:
        ipv4_address: 172.20.0.20
    labels:
      - "minilab.service=valheim"

  minilab-helper:
    build:
      context: ./minilab-helper
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID}
    container_name: minilab-helper
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_OWNER_ID=${DISCORD_OWNER_ID}
      - TZ=Europe/Paris
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
    restart: unless-stopped
    networks:
      minilab:
        ipv4_address: 172.20.0.30
    depends_on:
      - valheim